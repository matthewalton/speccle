<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 430 140" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="Speccle">
  <!--
    logo.svg self-inverts via the media query below, for renderers that ignore the
    README's <picture> element. logo-dark.svg is the static dark palette served when
    GitHub's own theme setting is dark. Edit geometry here, then mirror it there.
  -->
  <style>
    .layer { fill: #afb8c1; }
    .slice { fill: #1f883d; }
    .word  { fill: #24292f; }
    @media (prefers-color-scheme: dark) {
      .layer { fill: #484f58; }
      .slice { fill: #3fb950; }
      .word  { fill: #e6edf3; }
    }
  </style>

  <!-- three layers of the stack: spec, code, tests -->
  <rect class="layer" x="24" y="34" width="92" height="16" rx="8"/>
  <rect class="layer" x="24" y="62" width="72" height="16" rx="8"/>
  <rect class="layer" x="24" y="90" width="84" height="16" rx="8"/>

  <!-- one vertical slice cut through all of them -->
  <rect class="slice" x="68" y="20" width="24" height="100" rx="12"/>

  <!-- wordmark -->
  <text class="word" x="136" y="91" font-size="58" font-weight="700" letter-spacing="-1.5">Speccle</text>
</svg>
